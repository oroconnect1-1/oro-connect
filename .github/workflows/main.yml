name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

      - name: Initialize Capacitor and Android
        run: |
          # Folder 'android' yoo hin jiraanne ofumaan uuma
          npx cap init "ORO-CONNECT" "com.oroconnect.app" --web-dir www
          npx cap add android

      - name: Generate App Icons
        run: |
          # Folder assets uumee fakkii www/icon.png keessa kaaya
          mkdir -p assets
          cp www/icon.png assets/icon.png
          # Meeshaan kun ofumaan folder assets/icon.png irraa dubbisa
          npx capacitor-assets generate --android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ORO-CONNECT-APK
          path: my-app/android/app/build/outputs/apk/debug/app-debug.apk


